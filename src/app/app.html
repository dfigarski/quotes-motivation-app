<div class="app-container">
  <app-header></app-header>

  <section class="author-box">
    <h2>O autorze projektu</h2>
    <p>Autor: Dominik Figarski</p>
    <p>Projekt wykonany w Angular.</p>
  </section>

  <div *ngIf="isLoading" class="loading-box">
    <p>Ładowanie cytatów...</p>
  </div>

  <app-error-message *ngIf="hasError"></app-error-message>

  <app-empty-state *ngIf="isEmpty"></app-empty-state>

  <app-quote-list
    *ngIf="!isLoading && !hasError && quotes.length > 0"
    [quotes]="quotes"
    (toggle)="toggleQuote($event)"
  ></app-quote-list>
</div>
